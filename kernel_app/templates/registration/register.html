{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <h1>Регистрация</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Создать аккаунт</button>
        </form>

        <a class="auth-link" href="/login/">Уже есть аккаунт? Войти</a>
    </div>
</body>
</html>
